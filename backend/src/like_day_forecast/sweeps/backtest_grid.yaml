# W&B Sweep — combined backtest + grid search
# Tests multiple configs across multiple dates for statistically robust comparison.
# Total runs: 26 dates x 3 n_analogs x 2 methods = 156 runs

program: src/like_day_forecast/scripts/run_sweep.py
method: grid

metric:
  name: mae
  goal: minimize

parameters:
  forecast_date:
    values:
      - "2026-02-15"
      - "2026-02-16"
      - "2026-02-17"
      - "2026-02-18"
      - "2026-02-19"
      - "2026-02-20"
      - "2026-02-21"
      - "2026-02-22"
      - "2026-02-23"
      - "2026-02-24"
      - "2026-02-25"
      - "2026-02-26"
      - "2026-02-27"
      - "2026-02-28"
      - "2026-03-01"
      - "2026-03-02"
      - "2026-03-03"
      - "2026-03-04"
      - "2026-03-05"
      - "2026-03-06"
      - "2026-03-07"
      - "2026-03-08"
      - "2026-03-09"
      - "2026-03-10"
      - "2026-03-11"
      - "2026-03-12"
  n_analogs:
    values: [20, 30, 40]
  weight_method:
    values: ["inverse_distance", "softmax"]
  season_window_days:
    values: [30]
  same_dow_group:
    values: [true]
